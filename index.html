<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Calculator</title>
</head>
<body>
    <h2>Stat Calculator</h2>

    <label>Base Value (Weapon/Spell):</label>
    <input type="number" id="base-value" value="10"><br><br>

    <label>d20 Roll:</label>
    <input type="number" id="d20-roll" value="10"><br><br>

    <hr>

    <label>Strength:</label> <input type="number" id="strength" value="0"><br><br>
    <label>Speed:</label> <input type="number" id="speed" value="0"><br><br>
    <label>Endurance:</label> <input type="number" id="endurance" value="0"><br><br>
    <label>Constitution:</label> <input type="number" id="constitution" value="0"><br><br>
    <label>Dexterity:</label> <input type="number" id="dexterity" value="0"><br><br>
    <label>Forecast:</label> <input type="number" id="forecast" value="0"><br><br>
    <label>Casting:</label> <input type="number" id="casting" value="0"><br><br>
    <label>Control:</label> <input type="number" id="control" value="0"><br><br>
    <label>Mana Supply:</label> <input type="number" id="mana-supply" value="0"><br><br>

    <button onclick="calculateAll()">Calculate Everything</button>

    <h3>Results:</h3>
    <div id="result-box">
        </div>

    <script src="script.js"></script>
</body>
</html>
